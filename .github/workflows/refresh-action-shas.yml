name: Refresh Action SHAs # excludes this action

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-shas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@0c366fd3fbcf3c5e9e2f1f6d8f6e4f1c2b4f3c3f

      - name: Setup Node
        uses: actions/setup-node@53b8394f6e8e4e0f7c1e6c2f4d9c1a5b2f8d9c3a
        with:
          node-version: 24
          cache: npm

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Update SHAs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=(
            ".github/workflows/main.yml"
          )

          declare -A ACTIONS=(
            ["actions/checkout"]="v4"
            ["actions/setup-node"]="v4"
            ["actions/upload-pages-artifact"]="v3"
            ["actions/deploy-pages"]="v4"
          )

          for FILE in "${FILES[@]}"; do
            echo "Updating SHAs in $FILE"

            for ACTION in "${!ACTIONS[@]}"; do
              VERSION="${ACTIONS[$ACTION]}"
              LATEST_SHA=$(gh api repos/$ACTION/commits/$VERSION -q .sha)

              echo "Updating $ACTION to $LATEST_SHA"
              sed -i "s|$ACTION@.*|$ACTION@$LATEST_SHA|g" "$FILE"
            done
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh GitHub Action SHAs"
          title: "Weekly SHA Refresh"
          body: "Automated update of pinned GitHub Action SHAs."
          branch: "auto/update-action-shas"
          labels: "automation,security"
