name: Refresh Action SHAs

on:
  schedule:
    - cron: "0 3 * * 1" # Mondays at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-shas:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 24
          cache: npm

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Update SHAs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Workflows to update (exclude this file to avoid self-modification)
          FILES=(
            ".github/workflows/main.yml"
          )

          # Actions and version tags to track
          declare -A ACTIONS=(
            ["actions/checkout"]="v4"
            ["actions/setup-node"]="v4"
            ["actions/upload-pages-artifact"]="v4"
            ["actions/deploy-pages"]="v4"
            ["actions/upload-artifact"]="v4"
          )

          for FILE in "${FILES[@]}"; do
            echo "Updating SHAs in $FILE"

            for ACTION in "${!ACTIONS[@]}"; do
              VERSION="${ACTIONS[$ACTION]}"
              LATEST_SHA=$(gh api repos/$ACTION/commits/$VERSION -q .sha)

              echo "Updating $ACTION to $LATEST_SHA"
              sed -i "s|$ACTION@.*|$ACTION@$LATEST_SHA|g" "$FILE"
            done
          done

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: refresh GitHub Action SHAs"
          title: "Weekly SHA Refresh"
          body: "Automated update of pinned GitHub Action SHAs."
          branch: "auto/update-action-shas"
          labels: "automation,security"
